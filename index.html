<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1C2B33">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>نظام الإدارة الشخصي</title>
<style>
  :root{
    --ink:#1C2B33; --ink2:#31454F; --paper:#F7F3EC; --card:#fff;
    --brass:#C9A227; --green:#0E7C66; --red:#B54834; --line:#E5DDCE; --muted:#8A8273;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{font-size:16px;}
  body{margin:0; font-family:system-ui,'Segoe UI',Tahoma,sans-serif; background:var(--paper); color:var(--ink); padding-bottom:calc(88px + env(safe-area-inset-bottom));}
  header{background:var(--ink); color:var(--paper); padding:calc(16px + env(safe-area-inset-top)) 20px 14px; position:sticky; top:0; z-index:9;}
  header .eyebrow{font-size:12px; letter-spacing:2px; color:var(--brass);}
  header h1{font-size:21px; margin:2px 0 0; font-weight:700;}
  main{padding:14px; width:100%; margin:0 auto;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:15px; margin-bottom:12px;}
  .accent-brass{border-inline-start:4px solid var(--brass);}
  .accent-green{border-inline-start:4px solid var(--green);}
  .accent-red{border-inline-start:4px solid var(--red);}
  .accent-muted{border-inline-start:4px solid var(--muted);}
  .stats{display:flex; gap:8px;}
  .stat{flex:1; text-align:center;}
  .stat .lbl{font-size:11px; color:var(--muted); margin-bottom:4px;}
  .stat .val{font-size:18px; font-weight:700; font-variant-numeric:tabular-nums;}
  .stat .cur{font-size:10px; color:var(--muted);}
  .vline{width:1px; background:var(--line);}
  .sec-title{font-size:13px; font-weight:700; margin-bottom:10px;}
  .row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);}
  .dot{width:8px; height:8px; border-radius:99px; flex-shrink:0;}
  .row .info{flex:1; min-width:0;}
  .row .t1{font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .row .t2{font-size:11px; color:var(--muted);}
  .row .amt{font-weight:700; font-size:14px; font-variant-numeric:tabular-nums;}
  .row .del{background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer;}
  .btn{width:100%; padding:14px; border-radius:10px; border:none; background:var(--ink); color:var(--paper); font-weight:700; font-size:16px; cursor:pointer; margin-bottom:12px; font-family:inherit;}
  .btn-sm{flex:1; padding:11px; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit;}
  input,select{width:100%; padding:12px; border-radius:8px; border:1px solid var(--line); margin-bottom:9px; font-size:16px; font-family:inherit; background:#FCFAF5; appearance:none;}
  .seg{display:flex; gap:8px; margin-bottom:10px;}
  .seg button{flex:1; padding:12px; border-radius:8px; border:2px solid var(--line); background:#fff; color:var(--ink); font-weight:700; font-size:15px; cursor:pointer; font-family:inherit;}
  .seg button.on-out{border-color:var(--red); background:var(--red); color:#fff;}
  .seg button.on-in{border-color:var(--green); background:var(--green); color:#fff;}
  .muted{color:var(--muted); font-size:13px;}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:12px;}
  nav{position:fixed; bottom:0; inset-inline:0; background:var(--ink); display:flex; justify-content:space-around; padding:10px 0 calc(12px + env(safe-area-inset-bottom)); border-top:2px solid var(--brass); z-index:10;}
  nav button{background:none; border:none; color:#9FB0B8; font-size:11px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; font-family:inherit; padding:2px 4px; min-width:44px;}
  nav button.active{color:var(--brass); font-weight:700;}
  nav button .ic{font-size:19px;}
  .bar-wrap{height:8px; background:var(--line); border-radius:99px;}
  .bar{height:100%; border-radius:99px;}
  .brk-row{display:flex; justify-content:space-between; font-size:12px; margin-bottom:3px;}
  .chart{display:flex; align-items:flex-end; gap:6px; height:140px;}
  .chart .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;}
  .chart .bars{display:flex; gap:3px; align-items:flex-end; height:110px; width:100%; justify-content:center;}
  .chart .b{width:10px; border-radius:3px;}
  .chart .m{font-size:9px; color:var(--muted);}
  .legend{display:flex; gap:14px; margin-top:10px; font-size:11px; color:var(--muted); align-items:center;}
  .sw{display:inline-block; width:8px; height:8px; border-radius:2px; margin-inline-end:4px;}
  .hidden{display:none;}
  .flexrow{display:flex; gap:8px; margin-top:10px;}
  .green{color:var(--green);} .red{color:var(--red);} .brassc{color:var(--brass);}
</style>
</head>
<body>
<header>
  <div class="eyebrow">نظام الإدارة الشخصي</div>
  <h1 id="pageTitle">لوحة المعلومات</h1>
</header>
<main id="main"></main>
<nav id="nav"></nav>

<script>
"use strict";
// ─── البيانات ───
const KEY = "erp-data-v1";
const CATS_EXP = ["مصاريف منزل","سيارة ووقود","مشتريات","المتحف","فواتير خدمات","أخرى"];
const CATS_INC_BASE = ["راتب","أعمال جانبية","المتحف"];
const MONTHS = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];

let D = { tx: [], inv: [], incCats: [], projects: [] };
try { const s = localStorage.getItem(KEY); if (s) D = Object.assign(D, JSON.parse(s)); } catch(e){}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(D)); }catch(e){ alert("تعذر الحفظ — تأكد من مساحة التخزين"); } }

let tab = "dash";
let txFormOpen = false, invFormOpen = false;
let txType = "out";

const fmt = n => new Intl.NumberFormat("en-US",{maximumFractionDigits:2}).format(n||0);
const today = () => new Date().toISOString().slice(0,10);
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const curKey = () => { const n=new Date(); return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0"); };

function incomeCats(){
  const active = D.projects.filter(p=>p.status==="active").map(p=>"مشروع: "+p.name);
  return [...CATS_INC_BASE, ...D.incCats, ...active, "أخرى"];
}

// ─── التنقل ───
const TABS = [
  ["dash","اللوحة","◧","لوحة المعلومات"],
  ["tx","الحركات","⇄","الحركات المالية"],
  ["inv","الفواتير","▤","الفواتير"],
  ["cats","الفئات","❖","فئات الدخل"],
  ["proj","المشاريع","◈","المشاريع المستقبلية"],
  ["rep","التقارير","▦","التقارير"],
];
function renderNav(){
  document.getElementById("nav").innerHTML = TABS.map(([k,l,ic]) =>
    `<button class="${tab===k?'active':''}" onclick="go('${k}')"><span class="ic">${ic}</span>${l}</button>`).join("");
}
function go(k){ tab=k; txFormOpen=false; invFormOpen=false; render(); }

// ─── العرض ───
function render(){
  renderNav();
  document.getElementById("pageTitle").textContent = TABS.find(t=>t[0]===tab)[3];
  const m = document.getElementById("main");
  if(tab==="dash") m.innerHTML = vDash();
  if(tab==="tx") m.innerHTML = vTx();
  if(tab==="inv") m.innerHTML = vInv();
  if(tab==="cats") m.innerHTML = vCats();
  if(tab==="proj") m.innerHTML = vProj();
  if(tab==="rep") m.innerHTML = vRep();
  window.scrollTo(0,0);
}

function rowHtml(t, del){
  const col = t.type==="in" ? "var(--green)" : "var(--red)";
  const sign = t.type==="in" ? "+" : "−";
  return `<div class="row">
    <div class="dot" style="background:${col}"></div>
    <div class="info"><div class="t1">${esc(t.note||t.cat)}</div><div class="t2">${esc(t.cat)} · ${esc(t.date)}</div></div>
    <div class="amt" style="color:${col}">${sign}${fmt(t.amount)}</div>
    ${del?`<button class="del" onclick="delTx('${t.id}')">✕</button>`:""}
  </div>`;
}

function vDash(){
  const ck = curKey();
  let inc=0, exp=0;
  D.tx.forEach(t=>{ if((t.date||"").startsWith(ck)){ t.type==="in"?inc+=+t.amount:exp+=+t.amount; }});
  const net = inc-exp;
  const unpaid = D.inv.filter(i=>i.status==="unpaid");
  const unpaidSum = unpaid.reduce((s,i)=>s+ +i.amount,0);
  const recent = [...D.tx].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  return `
  <div class="card">
    <div class="sec-title brassc">شهر ${MONTHS[new Date().getMonth()]}</div>
    <div class="stats">
      <div class="stat"><div class="lbl">الدخل</div><div class="val green">${fmt(inc)}</div><div class="cur">ر.س</div></div>
      <div class="vline"></div>
      <div class="stat"><div class="lbl">المصروف</div><div class="val red">${fmt(exp)}</div><div class="cur">ر.س</div></div>
      <div class="vline"></div>
      <div class="stat"><div class="lbl">الصافي</div><div class="val ${net>=0?'green':'red'}">${fmt(net)}</div><div class="cur">ر.س</div></div>
    </div>
  </div>
  ${unpaid.length?`<div class="card accent-brass"><div style="font-size:14px">لديك <b>${unpaid.length}</b> فاتورة غير مسددة بإجمالي <b>${fmt(unpaidSum)} ر.س</b></div></div>`:""}
  <div class="card">
    <div class="sec-title">آخر الحركات</div>
    ${recent.length? recent.map(t=>rowHtml(t,false)).join("") : `<div class="muted">لا توجد حركات بعد — أضف أول حركة من تبويب «الحركات».</div>`}
  </div>`;
}

// ─── الحركات ───
function vTx(){
  const cats = txType==="in" ? incomeCats() : CATS_EXP;
  const sorted = [...D.tx].sort((a,b)=>b.date.localeCompare(a.date));
  return `
  <button class="btn" onclick="txFormOpen=!txFormOpen;render()">${txFormOpen?"إغلاق":"＋ حركة جديدة"}</button>
  ${txFormOpen?`
  <div class="card">
    <div class="seg">
      <button class="${txType==='out'?'on-out':''}" onclick="txType='out';render()">مصروف</button>
      <button class="${txType==='in'?'on-in':''}" onclick="txType='in';render()">دخل</button>
    </div>
    <input id="txAmt" type="number" inputmode="decimal" placeholder="المبلغ (ر.س)">
    <select id="txCat">${cats.map(c=>`<option>${esc(c)}</option>`).join("")}</select>
    <input id="txDate" type="date" value="${today()}">
    <input id="txNote" placeholder="ملاحظة (اختياري)">
    <button class="btn" style="margin-bottom:0" onclick="addTx()">حفظ الحركة</button>
  </div>`:""}
  <div class="card">
    ${sorted.length? sorted.map(t=>rowHtml(t,true)).join("") : `<div class="empty">السجل فارغ — أضف أول حركة.</div>`}
  </div>`;
}
function addTx(){
  const amt = +document.getElementById("txAmt").value;
  if(!amt || amt<=0) return;
  D.tx.unshift({
    id: Date.now()+"", type: txType, amount: amt,
    cat: document.getElementById("txCat").value,
    date: document.getElementById("txDate").value || today(),
    note: document.getElementById("txNote").value.trim(),
  });
  save(); txFormOpen=false; render();
}
function delTx(id){ D.tx = D.tx.filter(t=>t.id!==id); save(); render(); }

// ─── الفواتير ───
function vInv(){
  return `
  <button class="btn" onclick="invFormOpen=!invFormOpen;render()">${invFormOpen?"إغلاق":"＋ فاتورة جديدة"}</button>
  ${invFormOpen?`
  <div class="card">
    <input id="ivClient" placeholder="اسم العميل / الجهة">
    <input id="ivDesc" placeholder="الوصف">
    <input id="ivAmt" type="number" inputmode="decimal" placeholder="المبلغ (ر.س)">
    <label style="font-size:11px;color:var(--muted)">تاريخ الاستحقاق</label>
    <input id="ivDue" type="date" value="${today()}">
    <button class="btn" style="margin-bottom:0" onclick="addInv()">إنشاء الفاتورة</button>
  </div>`:""}
  ${!D.inv.length?`<div class="card"><div class="empty">لا توجد فواتير — أنشئ أول فاتورة.</div></div>`:""}
  ${D.inv.map(i=>{
    const overdue = i.status==="unpaid" && i.due < today();
    const acc = i.status==="paid"?"accent-green": overdue?"accent-red":"accent-brass";
    return `<div class="card ${acc}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-size:11px;color:var(--muted)">${esc(i.num)}</div>
          <div style="font-weight:700">${esc(i.client)}</div>
          ${i.desc?`<div style="font-size:12px;color:var(--ink2)">${esc(i.desc)}</div>`:""}
          <div style="font-size:11px;margin-top:4px;color:${overdue?'var(--red)':'var(--muted)'}">الاستحقاق: ${esc(i.due)} ${overdue?"· متأخرة":""}</div>
        </div>
        <div style="text-align:left">
          <div style="font-weight:700;font-size:16px;font-variant-numeric:tabular-nums">${fmt(i.amount)} ر.س</div>
          <div style="font-size:11px;font-weight:700" class="${i.status==='paid'?'green':'brassc'}">${i.status==="paid"?"مسددة":"غير مسددة"}</div>
        </div>
      </div>
      <div class="flexrow">
        <button class="btn-sm" style="background:${i.status==='paid'?'#fff':'var(--green)'};color:${i.status==='paid'?'var(--ink)':'#fff'};border:1px solid ${i.status==='paid'?'var(--line)':'var(--green)'}" onclick="toggleInv('${i.id}')">${i.status==="paid"?"إعادة كغير مسددة":"تحديد كمسددة"}</button>
        <button class="btn-sm" style="background:#fff;color:var(--red);border:1px solid var(--line)" onclick="delInv('${i.id}')">حذف</button>
      </div>
    </div>`;
  }).join("")}`;
}
function addInv(){
  const client = document.getElementById("ivClient").value.trim();
  const amt = +document.getElementById("ivAmt").value;
  if(!client || !amt || amt<=0) return;
  D.inv.unshift({
    id: Date.now()+"", num: "INV-"+String(D.inv.length+1).padStart(3,"0"),
    client, desc: document.getElementById("ivDesc").value.trim(),
    amount: amt, due: document.getElementById("ivDue").value || today(), status:"unpaid",
  });
  save(); invFormOpen=false; render();
}
function toggleInv(id){ D.inv = D.inv.map(i=> i.id===id ? {...i, status: i.status==="paid"?"unpaid":"paid"} : i); save(); render(); }
function delInv(id){ D.inv = D.inv.filter(i=>i.id!==id); save(); render(); }

// ─── فئات الدخل ───
function vCats(){
  const active = D.projects.filter(p=>p.status==="active");
  return `
  <div class="card">
    <div class="sec-title">إضافة فئة دخل جديدة</div>
    <input id="catName" placeholder="اسم الفئة (مثال: إيجار عقار، استشارات)">
    <button class="btn" style="margin-bottom:0" onclick="addCat()">إضافة الفئة</button>
  </div>
  <div class="card">
    <div class="sec-title">فئاتك المخصصة</div>
    ${D.incCats.length? D.incCats.map(c=>`
      <div class="row" style="justify-content:space-between">
        <span style="font-size:14px;font-weight:600">${esc(c)}</span>
        <button class="del" style="color:var(--red);font-size:13px" onclick="delCat('${esc(c)}')">حذف</button>
      </div>`).join("") : `<div class="muted">لا توجد فئات مخصصة بعد.</div>`}
  </div>
  <div class="card accent-brass">
    <div class="sec-title">فئات من المشاريع الفعالة</div>
    ${active.length? active.map(p=>`<div class="row" style="font-size:14px;font-weight:600">مشروع: ${esc(p.name)} <span style="font-size:11px" class="green">· فعال</span></div>`).join("") : `<div class="muted">لا توجد مشاريع فعالة — فعّل مشروعًا من قسم «المشاريع» وسيظهر هنا كفئة دخل تلقائيًا.</div>`}
    <div style="font-size:11px;color:var(--muted);margin-top:8px">الفئات الأساسية (${CATS_INC_BASE.join("، ")}) موجودة دائمًا عند تسجيل الدخل.</div>
  </div>`;
}
function addCat(){
  const n = document.getElementById("catName").value.trim();
  if(!n || D.incCats.includes(n)) return;
  D.incCats.push(n); save(); render();
}
function delCat(n){ D.incCats = D.incCats.filter(c=>c!==n); save(); render(); }

// ─── المشاريع ───
function vProj(){
  return `
  <div class="card">
    <div class="sec-title">مشروع مستقبلي جديد</div>
    <input id="prName" placeholder="اسم المشروع">
    <input id="prDesc" placeholder="وصف مختصر (اختياري)">
    <button class="btn" style="margin-bottom:0" onclick="addProj()">إضافة المشروع</button>
  </div>
  ${!D.projects.length?`<div class="card"><div class="empty">لا توجد مشاريع بعد.</div></div>`:""}
  ${D.projects.map(p=>`
  <div class="card ${p.status==='active'?'accent-green':'accent-muted'}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-weight:700">${esc(p.name)}</div>
        ${p.desc?`<div style="font-size:12px;color:var(--ink2)">${esc(p.desc)}</div>`:""}
        <div style="font-size:11px;color:var(--muted);margin-top:4px">أضيف في ${esc(p.created)}</div>
      </div>
      <div style="font-size:11px;font-weight:700;white-space:nowrap" class="${p.status==='active'?'green':''}" ${p.status!=='active'?'style="color:var(--muted);font-size:11px;font-weight:700;white-space:nowrap"':''}>${p.status==="active"?"فعال":"مستقبلي"}</div>
    </div>
    ${p.status==="active"?`<div style="font-size:11px;margin-top:6px" class="green">✓ يظهر الآن كفئة دخل باسم «مشروع: ${esc(p.name)}»</div>`:""}
    <div class="flexrow">
      <button class="btn-sm" style="background:${p.status==='active'?'#fff':'var(--green)'};color:${p.status==='active'?'var(--ink)':'#fff'};border:1px solid ${p.status==='active'?'var(--line)':'var(--green)'}" onclick="toggleProj('${p.id}')">${p.status==="active"?"إيقاف التفعيل":"تفعيل المشروع"}</button>
      <button class="btn-sm" style="background:#fff;color:var(--red);border:1px solid var(--line)" onclick="delProj('${p.id}')">حذف</button>
    </div>
  </div>`).join("")}`;
}
function addProj(){
  const n = document.getElementById("prName").value.trim();
  if(!n) return;
  D.projects.unshift({ id: Date.now()+"", name:n, desc: document.getElementById("prDesc").value.trim(), status:"planned", created: today() });
  save(); render();
}
function toggleProj(id){ D.projects = D.projects.map(p=> p.id===id ? {...p, status: p.status==="active"?"planned":"active"} : p); save(); render(); }
function delProj(id){ D.projects = D.projects.filter(p=>p.id!==id); save(); render(); }

// ─── التقارير ───
function vRep(){
  const now = new Date(), ck = curKey();
  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const key = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    let inc=0, exp=0;
    D.tx.forEach(t=>{ if((t.date||"").startsWith(key)){ t.type==="in"?inc+=+t.amount:exp+=+t.amount; }});
    months.push({label: MONTHS[d.getMonth()], inc, exp});
  }
  const max = Math.max(1, ...months.flatMap(m=>[m.inc,m.exp]));
  const brk = (type)=>{
    const m={};
    D.tx.forEach(t=>{ if(t.type===type && (t.date||"").startsWith(ck)) m[t.cat]=(m[t.cat]||0)+ +t.amount; });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  };
  const incB = brk("in"), expB = brk("out");
  const incMax = Math.max(1, ...incB.map(([,v])=>v));
  const expMax = Math.max(1, ...expB.map(([,v])=>v));
  const mn = MONTHS[now.getMonth()];
  const bars = (arr, maxV, color) => arr.map(([cat,val])=>`
    <div style="margin-bottom:10px">
      <div class="brk-row"><span>${esc(cat)}</span><span style="font-weight:700;font-variant-numeric:tabular-nums">${fmt(val)} ر.س</span></div>
      <div class="bar-wrap"><div class="bar" style="width:${(val/maxV)*100}%;background:${color}"></div></div>
    </div>`).join("");
  return `
  <div class="card">
    <div class="sec-title">الدخل والمصروف — آخر ٦ أشهر</div>
    <div class="chart">
      ${months.map(m=>`
      <div class="col">
        <div class="bars">
          <div class="b" style="height:${(m.inc/max)*100}%;min-height:${m.inc?3:0}px;background:var(--green)"></div>
          <div class="b" style="height:${(m.exp/max)*100}%;min-height:${m.exp?3:0}px;background:var(--red)"></div>
        </div>
        <div class="m">${m.label}</div>
      </div>`).join("")}
    </div>
    <div class="legend"><span><span class="sw" style="background:var(--green)"></span>دخل</span><span><span class="sw" style="background:var(--red)"></span>مصروف</span></div>
  </div>
  <div class="card">
    <div class="sec-title">دخل ${mn} حسب المصدر</div>
    ${incB.length? bars(incB, incMax, "var(--green)") : `<div class="muted">لا يوجد دخل مسجل هذا الشهر.</div>`}
  </div>
  <div class="card">
    <div class="sec-title">مصاريف ${mn} حسب الفئة</div>
    ${expB.length? bars(expB, expMax, "var(--brass)") : `<div class="muted">لا توجد مصاريف هذا الشهر.</div>`}
  </div>`;
}

render();
if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(()=>{}); }
</script>
</body>
</html>
