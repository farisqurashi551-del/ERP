<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1C2B33">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>نظام الإدارة الشخصي</title>
<style>
  :root{
    --ink:#1C2B33; --ink2:#31454F; --paper:#F7F3EC; --card:#fff;
    --brass:#C9A227; --green:#0E7C66; --red:#B54834; --line:#E5DDCE; --muted:#8A8273;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{font-size:16px;}
  html,body{direction:rtl;}
  body{margin:0; font-family:system-ui,'Segoe UI',Tahoma,sans-serif; background:var(--paper); color:var(--ink); padding-bottom:calc(88px + env(safe-area-inset-bottom));}
  header{background:var(--ink); color:var(--paper); padding:calc(16px + env(safe-area-inset-top)) 20px 14px; position:sticky; top:0; z-index:9;}
  header .eyebrow{font-size:12px; letter-spacing:2px; color:var(--brass);}
  header h1{font-size:21px; margin:2px 0 0; font-weight:700;}
  .hicons{position:absolute; inset-inline-end:14px; top:calc(20px + env(safe-area-inset-top)); display:flex; gap:8px;}
  .hicons button{background:rgba(255,255,255,.08); border:1px solid var(--brass); color:var(--paper); border-radius:10px; width:40px; height:40px; font-size:17px; cursor:pointer;}
  main{padding:14px; width:100%; margin:0 auto;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:15px; margin-bottom:12px;}
  .accent-brass{border-inline-start:4px solid var(--brass);}
  .stats{display:flex; gap:8px;}
  .stat{flex:1; text-align:center;}
  .stat .lbl{font-size:11px; color:var(--muted); margin-bottom:4px;}
  .stat .val{font-size:18px; font-weight:700; font-variant-numeric:tabular-nums;}
  .stat .cur{font-size:10px; color:var(--muted);}
  .vline{width:1px; background:var(--line);}
  .sec-title{font-size:13px; font-weight:700; margin-bottom:10px;}
  .row{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--line);}
  .dot{width:8px; height:8px; border-radius:99px; flex-shrink:0;}
  .row .info{flex:1; min-width:0;}
  .row .t1{font-size:13px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .row .t2{font-size:11px; color:var(--muted);}
  .row .amt{font-weight:700; font-size:14px; font-variant-numeric:tabular-nums;}
  .icbtn{background:none; border:none; cursor:pointer; font-size:16px; color:var(--ink2); padding:4px;}
  .btn{width:100%; padding:14px; border-radius:10px; border:none; background:var(--ink); color:var(--paper); font-weight:700; font-size:16px; cursor:pointer; margin-bottom:12px; font-family:inherit;}
  .btn-sm{flex:1; padding:11px; border-radius:8px; font-weight:700; font-size:13px; cursor:pointer; font-family:inherit; border:1px solid var(--line); background:#fff;}
  input,select{width:100%; padding:12px; border-radius:8px; border:1px solid var(--line); margin-bottom:9px; font-size:16px; font-family:inherit; background:#FCFAF5; appearance:none; direction:rtl; text-align:right;}
  input::placeholder{text-align:right;}
  input[type=number],input[type=date],input[type=datetime-local]{direction:ltr; text-align:right;}
  .seg{display:flex; gap:8px; margin-bottom:10px;}
  .seg button{flex:1; padding:12px; border-radius:8px; border:2px solid var(--line); background:#fff; color:var(--ink); font-weight:700; font-size:15px; cursor:pointer; font-family:inherit;}
  .seg button.on-out{border-color:var(--red); background:var(--red); color:#fff;}
  .seg button.on-in{border-color:var(--green); background:var(--green); color:#fff;}
  .muted{color:var(--muted); font-size:13px;}
  .empty{color:var(--muted); font-size:13px; text-align:center; padding:12px;}
  nav{position:fixed; bottom:0; inset-inline:0; background:var(--ink); display:flex; justify-content:space-around; padding:10px 0 calc(12px + env(safe-area-inset-bottom)); border-top:2px solid var(--brass); z-index:10;}
  nav button{background:none; border:none; color:#9FB0B8; font-size:10px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; font-family:inherit; padding:2px 3px; min-width:40px;}
  nav button.active{color:var(--brass); font-weight:700;}
  nav button .ic{font-size:18px;}
  .bar-wrap{height:8px; background:var(--line); border-radius:99px;}
  .bar{height:100%; border-radius:99px;}
  .brk-row{display:flex; justify-content:space-between; font-size:12px; margin-bottom:3px;}
  .chart{display:flex; align-items:flex-end; gap:6px; height:140px;}
  .chart .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;}
  .chart .bars{display:flex; gap:3px; align-items:flex-end; height:110px; width:100%; justify-content:center;}
  .chart .b{width:10px; border-radius:3px;}
  .chart .m{font-size:9px; color:var(--muted);}
  .legend{display:flex; gap:14px; margin-top:10px; font-size:11px; color:var(--muted); align-items:center;}
  .sw{display:inline-block; width:8px; height:8px; border-radius:2px; margin-inline-end:4px;}
  .flexrow{display:flex; gap:8px; margin-top:10px;}
  .green{color:var(--green);} .red{color:var(--red);} .brassc{color:var(--brass);}
  /* الأهداف */
  .yearnav{display:flex; align-items:center; justify-content:center; gap:16px; margin-bottom:12px;}
  .yearnav button{background:var(--ink); color:var(--paper); border:none; border-radius:8px; width:38px; height:38px; font-size:18px; cursor:pointer;}
  .yearnav .yt{font-size:17px; font-weight:700;}
  .goal{background:var(--card); border:1px solid var(--line); border-radius:12px; margin-bottom:10px; overflow:hidden;}
  .goal.hiddenit{opacity:.45;}
  .goal.doneit .ttl{text-decoration:line-through; color:var(--green);}
  .prices{display:flex; gap:8px;}
  .price{flex:1; text-align:center; background:#FCFAF5; border:1px solid var(--line); border-radius:10px; padding:10px 4px;}
  .price .pv{font-weight:700; font-size:15px; font-variant-numeric:tabular-nums;}
  .price .pl{font-size:10px; color:var(--muted); margin-top:2px;}
  .thumbs{display:flex; flex-wrap:wrap; gap:6px; padding:4px 0;}
  .thumb{width:64px; height:64px; object-fit:cover; border-radius:8px; border:1px solid var(--line); cursor:pointer;}
  button.thumb{background:#fff; font-size:22px; color:var(--muted); display:flex; align-items:center; justify-content:center; border-style:dashed; font-family:inherit;}
  .g-head{display:flex; align-items:center; gap:4px; padding:8px 10px;}
  .g-head .ttl{flex:1; border:none; background:none; font-size:15px; font-weight:700; padding:6px 2px; margin:0; font-family:inherit;}
  .g-head .ttl:focus{outline:none; border-bottom:2px solid var(--brass);}
  .ordcol{display:flex; flex-direction:column; gap:0;}
  .ordcol button{background:none; border:none; font-size:11px; color:var(--muted); cursor:pointer; padding:1px 4px; line-height:1;}
  .g-sub{padding:0 12px 10px; border-top:1px dashed var(--line);}
  .task{border-inline-start:3px solid var(--brass); background:#FCFAF5; border-radius:8px; margin-top:8px; padding:6px 8px;}
  .task.hiddenit{opacity:.45;}
  .t-head{display:flex; align-items:center; gap:4px;}
  .t-head .ttl{flex:1; border:none; background:none; font-size:14px; font-weight:600; padding:4px 2px; margin:0; font-family:inherit;}
  .t-head .ttl:focus{outline:none; border-bottom:2px solid var(--brass);}
  .step{display:flex; align-items:center; gap:8px; padding:4px 0; font-size:13px;}
  .step input[type=checkbox]{width:auto; margin:0;}
  .step .ttl{flex:1; border:none; background:none; font-size:13px; padding:3px 2px; margin:0; font-family:inherit;}
  .step.done .ttl{text-decoration:line-through; color:var(--muted);}
  .meta-line{font-size:11px; color:var(--muted); padding:0 12px 8px; display:flex; gap:12px; flex-wrap:wrap;}
  .addline{display:flex; gap:6px; margin-top:8px;}
  .addline input{margin-bottom:0; padding:9px; font-size:14px;}
  .addline button{border:none; background:var(--ink); color:#fff; border-radius:8px; padding:0 14px; font-family:inherit; font-weight:700; cursor:pointer;}
  /* الخريطة الذهنية */
  .mm-root{background:var(--ink); color:var(--paper); border:2px solid var(--brass); border-radius:12px; padding:12px 16px; font-weight:700; text-align:center; margin-bottom:4px;}
  .mm-branch{margin-inline-start:14px; border-inline-start:2px solid var(--brass); padding-inline-start:14px; padding-top:10px;}
  .mm-goal{background:var(--card); border:1.5px solid var(--brass); border-radius:10px; padding:10px 12px; font-weight:700; font-size:14px; cursor:pointer; position:relative;}
  .mm-goal::before, .mm-task::before{content:""; position:absolute; inset-inline-start:-16px; top:50%; width:14px; height:2px; background:var(--brass);}
  .mm-tasks{margin-inline-start:12px; border-inline-start:2px solid var(--line); padding-inline-start:14px; padding-top:8px;}
  .mm-task{background:#FCFAF5; border:1px solid var(--line); border-radius:8px; padding:7px 10px; font-size:13px; margin-bottom:8px; cursor:pointer; position:relative;}
  .mm-task::before{background:var(--line);}
  .mm-wrap{margin-bottom:14px;}
  .overlay{position:fixed; inset:0; background:rgba(28,43,51,.55); z-index:20; display:flex; align-items:center; justify-content:center; padding:20px;}
  .overlay .card{width:100%; max-width:420px; margin:0;}
  /* التقويم */
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .cal-head button{background:var(--ink); color:var(--paper); border:none; border-radius:8px; width:36px; height:36px; font-size:16px; cursor:pointer;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .cal-dh{text-align:center; font-size:10px; color:var(--muted); padding:4px 0; font-weight:700;}
  .cal-d{aspect-ratio:1; border:1px solid var(--line); border-radius:8px; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; font-size:13px; cursor:pointer; padding:2px;}
  .cal-d.off{background:transparent; border:none; cursor:default;}
  .cal-d.today{border:2px solid var(--brass); font-weight:700;}
  .cal-d.sel{background:var(--ink); color:#fff;}
  .cal-dots{display:flex; gap:2px;}
  .cal-dots span{width:5px; height:5px; border-radius:99px; display:block;}
  .toast{position:fixed; top:calc(10px + env(safe-area-inset-top)); inset-inline:14px; background:var(--brass); color:var(--ink); font-weight:700; padding:12px 14px; border-radius:10px; z-index:30; box-shadow:0 4px 14px rgba(0,0,0,.25); font-size:14px;}
  .hidden{display:none;}
</style>
</head>
<body>
<header>
  <div class="eyebrow">نظام الإدارة الشخصي</div>
  <h1 id="pageTitle">لوحة المعلومات</h1>
  <div class="hicons">
    <button title="جميع الأصول" onclick="go('assets')">🏛</button>
    <button title="الديون" onclick="go('debts')">🧾</button>
  </div>
</header>
<main id="main"></main>
<nav id="nav"></nav>
<div id="toastBox"></div>
<input type="file" id="imgIn" accept="image/*" class="hidden">

<script>
"use strict";
const KEY = "erp-data-v1";
const DEF_EXP = ["مصاريف منزل","سيارة ووقود","مشتريات","المتحف","فواتير خدمات","أخرى"];
const DEF_INC = ["راتب","أعمال جانبية","المتحف","أخرى"];
const MONTHS = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const DAYS = ["أحد","إثن","ثلا","أرب","خمي","جمع","سبت"];

let D = { tx:[], incCats:[], projects:[], goals:{}, commit:[], expList:null, incList:null, fired:[], recur:[], prices:null };
try { const s = localStorage.getItem(KEY); if (s) D = Object.assign(D, JSON.parse(s)); } catch(e){}
// ترحيل الفئات لقوائم قابلة للتعديل
if(!Array.isArray(D.expList)) D.expList = [...DEF_EXP];
if(!Array.isArray(D.incList)) D.incList = [...DEF_INC.filter(c=>c!=="أخرى"), ...(D.incCats||[]), "أخرى"];
if(!D.goals) D.goals = {};
if(!Array.isArray(D.commit)) D.commit = [];
if(!Array.isArray(D.fired)) D.fired = [];
if(!Array.isArray(D.recur)) D.recur = [];
if(!Array.isArray(D.assets)) D.assets = [];
if(!Array.isArray(D.debts)) D.debts = [];
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(D)); return true; }catch(e){ toast("تعذر الحفظ — مساحة التخزين ممتلئة"); return false; } }

let tab="dash", txFormOpen=false, txType="out", cmType="out";
const NOW = new Date();
let goalsYear = NOW.getFullYear();
let goalsView = "list";
let calY = NOW.getFullYear(), calM = NOW.getMonth();
let calSel = null, cmFormOpen = false, mapDetail = null, goalPage = null, recOpen = false, recType = "out", imgTarget = null, imgView = null;

const fmt = n => new Intl.NumberFormat("en-US",{maximumFractionDigits:2}).format(n||0);
const today = () => new Date().toISOString().slice(0,10);
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const curKey = () => NOW.getFullYear()+"-"+String(NOW.getMonth()+1).padStart(2,"0");
const fmtDT = s => { if(!s) return ""; const d=new Date(s); return d.toLocaleDateString("ar-SA-u-nu-latn")+" "+d.toLocaleTimeString("ar-SA-u-nu-latn",{hour:"2-digit",minute:"2-digit"}); };

function incomeCats(){
  const active = D.projects.filter(p=>p.status==="active").map(p=>"مشروع: "+p.name);
  return [...D.incList, ...active];
}
function toast(msg){
  const b=document.getElementById("toastBox");
  b.innerHTML = '<div class="toast">'+esc(msg)+'</div>';
  setTimeout(()=>{ b.innerHTML=""; }, 4000);
}

// ─── المنبهات ───
async function askNotif(){
  if(!("Notification" in window)) return false;
  if(Notification.permission==="default"){ try{ await Notification.requestPermission(); }catch(e){} }
  return Notification.permission==="granted";
}
function pushNotif(title, body){
  if("Notification" in window && Notification.permission==="granted"){
    if(navigator.serviceWorker){ navigator.serviceWorker.getRegistration().then(r=>{ if(r) r.showNotification(title,{body, icon:"icon-192.png", dir:"rtl", lang:"ar"}); else new Notification(title,{body}); }).catch(()=>{ try{ new Notification(title,{body}); }catch(e){} }); }
    else { try{ new Notification(title,{body}); }catch(e){} }
  }
}
function allReminders(){
  const out=[];
  D.commit.forEach(c=>{ if(c.remind) out.push({id:c.id, remind:c.remind, label:"التزام: "+c.title}); });
  Object.values(D.goals).forEach(arr=>arr.forEach(g=>{
    if(g.remind) out.push({id:g.id, remind:g.remind, label:"هدف: "+(g.title||"بدون عنوان")});
    (g.tasks||[]).forEach(t=>{ if(t.remind) out.push({id:t.id, remind:t.remind, label:"مهمة: "+(t.title||"بدون عنوان")}); });
  }));
  return out;
}
function checkReminders(){
  const now = Date.now();
  let changed=false;
  allReminders().forEach(r=>{
    const tag = r.id+"@"+r.remind;
    if(new Date(r.remind).getTime() <= now && !D.fired.includes(tag)){
      D.fired.push(tag); changed=true;
      pushNotif("تذكير", r.label);
      toast("⏰ "+r.label);
    }
  });
  if(changed) save();
}
setInterval(checkReminders, 30000);

// ─── التنقل ───
const TABS = [
  ["dash","اللوحة","◧","لوحة المعلومات"],
  ["tx","الحركات","⇄","الحركات المالية"],
  ["cal","التقويم","▦","التقويم المالي"],
  ["goals","الأهداف","◎","أهداف العام"],
  ["cats","الفئات","❖","إدارة الفئات"],
  ["proj","المشاريع","◈","المشاريع المستقبلية"],
  ["rep","التقارير","▤","التقارير"],
];
function renderNav(){
  const n = document.getElementById("nav");
  if(tab==="goals"){
    n.innerHTML =
      '<button onclick="go(\'dash\')"><span class="ic">◀</span>رجوع</button>'+
      '<button class="'+(goalsView==="list"?"active":"")+'" onclick="goalsView=\'list\';render()"><span class="ic">≡</span>الأساسية</button>'+
      '<button class="'+(goalsView==="map"?"active":"")+'" onclick="goalsView=\'map\';render()"><span class="ic">☍</span>الخريطة</button>';
    return;
  }
  n.innerHTML = TABS.map(([k,l,ic]) =>
    '<button class="'+(tab===k?"active":"")+'" onclick="go(\''+k+'\')"><span class="ic">'+ic+'</span>'+l+'</button>').join("");
}
function go(k){ tab=k; txFormOpen=false; cmFormOpen=false; mapDetail=null; goalPage=null; recOpen=false; render(); }

// ─── العرض ───
function render(){
  renderNav();
  const t = TABS.find(t=>t[0]===tab) || TABS[0];
  document.getElementById("pageTitle").textContent = tab==="goals" ? ("أهداف العام "+goalsYear) : tab==="assets" ? "جميع الأصول" : tab==="debts" ? "الديون" : t[3];
  const m = document.getElementById("main");
  if(tab==="dash"){ m.innerHTML = vDash(); refreshPrices(false); }
  if(tab==="assets") m.innerHTML = vAssets();
  if(tab==="debts") m.innerHTML = vDebts();
  if(tab==="tx") m.innerHTML = vTx();
  if(tab==="cal") m.innerHTML = vCal();
  if(tab==="goals") m.innerHTML = goalsView==="map" ? vMap() : (goalPage ? vGoalPage() : vGoals());
  if(tab==="cats") m.innerHTML = vCats();
  if(tab==="proj") m.innerHTML = vProj();
  if(tab==="rep") m.innerHTML = vRep();
  if(imgView) m.innerHTML += viewerHtml();
  window.scrollTo(0,0);
}

function rowHtml(t, del){
  const col = t.type==="in" ? "var(--green)" : "var(--red)";
  const sign = t.type==="in" ? "+" : "−";
  return '<div class="row"><div class="dot" style="background:'+col+'"></div>'+
    '<div class="info"><div class="t1">'+esc(t.note||t.cat)+'</div><div class="t2">'+esc(t.cat)+' · '+esc(t.date)+'</div></div>'+
    '<div class="amt" style="color:'+col+'">'+sign+fmt(t.amount)+'</div>'+
    (del?'<button class="icbtn" onclick="delTx(\''+t.id+'\')">✕</button>':"")+'</div>';
}

// ─── اللوحة ───
async function refreshPrices(force){
  const stale = !D.prices || (Date.now()-D.prices.t > 15*60*1000);
  if(!force && !stale){ paintPrices(); return; }
  try{
    const [er, xau, xag] = await Promise.all([
      fetch("https://open.er-api.com/v6/latest/USD").then(r=>r.json()),
      fetch("https://api.gold-api.com/price/XAU").then(r=>r.json()),
      fetch("https://api.gold-api.com/price/XAG").then(r=>r.json()),
    ]);
    const sar = er.rates && er.rates.SAR;
    if(sar && xau.price && xag.price){
      D.prices = { t:Date.now(), usdsar:sar, goldG:(xau.price/31.1035)*sar, silverG:(xag.price/31.1035)*sar };
      save();
    }
  }catch(e){}
  paintPrices();
}
function paintPrices(){
  const el = document.getElementById("priceCard"); if(!el) return;
  if(!D.prices){ el.innerHTML = '<div class="muted">تعذر جلب الأسعار — تحقق من الإنترنت ثم اضغط ↻</div>'; return; }
  const p = D.prices;
  el.innerHTML = '<div class="prices">'+
    '<div class="price"><div class="pv brassc">'+fmt(p.goldG)+'</div><div class="pl">ذهب / جرام (ر.س)</div></div>'+
    '<div class="price"><div class="pv">'+fmt(p.silverG)+'</div><div class="pl">فضة / جرام (ر.س)</div></div>'+
    '<div class="price"><div class="pv green">'+p.usdsar.toFixed(2)+'</div><div class="pl">دولار / ريال</div></div>'+
    '</div><div class="muted" style="font-size:10px;margin-top:6px">آخر تحديث: '+fmtDT(new Date(p.t).toISOString())+'</div>';
}
function vDash(){
  const ck = curKey();
  let inc=0, exp=0;
  D.tx.forEach(t=>{ if((t.date||"").startsWith(ck)){ t.type==="in"?inc+=+t.amount:exp+=+t.amount; }});
  const net = inc-exp;
  const upcoming = D.commit.filter(c=>c.date>=today()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,5);
  const recent = [...D.tx].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  return '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="sec-title" style="margin:0">الأسعار المباشرة</div><button class="icbtn" onclick="refreshPrices(true)">↻</button></div><div id="priceCard"><div class="muted">جارٍ جلب الأسعار…</div></div></div>'+
  '<div class="card"><div class="sec-title brassc">شهر '+MONTHS[NOW.getMonth()]+'</div><div class="stats">'+
    '<div class="stat"><div class="lbl">الدخل</div><div class="val green">'+fmt(inc)+'</div><div class="cur">ر.س</div></div><div class="vline"></div>'+

// ─── الحركات ───
function applyRecur(){
  const t = new Date();
  const cy = t.getFullYear(), cm = t.getMonth(), cd = t.getDate();
  let added = 0;
  D.recur.forEach(r=>{
    r.applied = r.applied || [];
    const start = new Date(r.start+"-01T00:00:00");
    let y = start.getFullYear(), m = start.getMonth();
    while(y < cy || (y===cy && m<=cm)){
      const key = y+"-"+String(m+1).padStart(2,"0");
      const dim = new Date(y, m+1, 0).getDate();
      const day = Math.min(r.day, dim);
      const due = (y<cy) || (m<cm) || (day<=cd);
      if(!r.applied.includes(key) && due){
        const ds = key+"-"+String(day).padStart(2,"0");
        D.tx.unshift({ id:uid(), type:r.type, amount:+r.amount, cat:r.cat, date:ds, note:r.note+" (ثابت شهري)" });
        r.applied.push(key); added++;
      }
      m++; if(m>11){ m=0; y++; }
    }
  });
  if(added){ save(); toast("أُضيفت "+added+" حركة ثابتة تلقائيًا"); }
}
function vRecur(){
  const cats = recType==="in" ? incomeCats() : D.expList;
  return '<div class="card accent-brass"><div class="sec-title">الثوابت الشهرية (راتب، إيجار...)</div>'+
    (D.recur.length? D.recur.map(r=>'<div class="row"><div class="dot" style="background:'+(r.type==="in"?"var(--green)":"var(--red)")+'"></div>'+
      '<div class="info"><div class="t1">'+esc(r.note)+'</div><div class="t2">'+esc(r.cat)+' · يوم '+r.day+' من كل شهر</div></div>'+
      '<div class="amt">'+fmt(r.amount)+'</div>'+
      '<button class="icbtn" onclick="delRec(\''+r.id+'\')">✕</button></div>').join("") : '<div class="muted">لا توجد ثوابت — أضف راتبك أو إيجارك وسيُسجَّل تلقائيًا كل شهر في اليوم الذي تحدده.</div>')+
    '<div style="margin-top:10px"><div class="seg">'+
    '<button class="'+(recType==="out"?"on-out":"")+'" onclick="recType=\'out\';render()">مصروف ثابت</button>'+
    '<button class="'+(recType==="in"?"on-in":"")+'" onclick="recType=\'in\';render()">دخل ثابت</button></div>'+
    '<input id="recNote" placeholder="الوصف (مثال: الراتب، إيجار المنزل)">'+

function addRec(){
  const note = document.getElementById("recNote").value.trim();

  let day = Math.round(+document.getElementById("recDay").value);

}

        '<button class="icbtn" onclick="delCm(\''+c.id+'\')">✕</button></div>').join("") : "")+
      (!it.tx.length && !it.cm.length ? '<div class="muted">لا يوجد شيء في هذا اليوم.</div>' : "")+
      '<button class="btn" style="margin:12px 0 0" onclick="cmFormOpen=!cmFormOpen;render()">'+(cmFormOpen?"إغلاق":"＋ إضافة التزام في هذا اليوم")+'</button>'+

        '<button class="'+(cmType==="out"?"on-out":"")+'" onclick="cmType=\'out\';render()">مصروف متوقع</button>'+
        '<button class="'+(cmType==="in"?"on-in":"")+'" onclick="cmType=\'in\';render()">دخل متوقع</button></div>'+

        '<input id="cmAmt" type="number" inputmode="decimal" placeholder="المبلغ (ر.س)">'+
        '<label style="font-size:11px;color:var(--muted)">منبه (اختياري)</label>'+
        '<input id="cmRem" type="datetime-local">'+
        '<button class="btn" style="margin-bottom:0" onclick="addCm()">حفظ الالتزام</button></div>' : "")+
      '</div>';
  }
  return '<div class="card"><div class="cal-head">'+

async function addCm(){

function setGD(gid,v){ const g=findGoal(gid); if(g){ g.date=v; save(); render(); } }
async function setGR(gid,v){ const g=findGoal(gid); if(g){ g.remind=v; if(v) await askNotif(); save(); render(); } }
function tgG(gid,prop){ const g=findGoal(gid); if(g){ g[prop]=!g[prop]; save(); render(); } }

function delTask(gid,tid){ const g=findGoal(gid); if(g){ g.tasks=g.tasks.filter(t=>t.id!==tid); save(); render(); } }
function setTT(gid,tid,v){ const t=findTask(gid,tid); if(t){ t.title=v.trim(); save(); } }
async function setTR(gid,tid,v){ const t=findTask(gid,tid); if(t){ t.remind=v; if(v) await askNotif(); save(); render(); } }
function tgT(gid,tid,prop){ const t=findTask(gid,tid); if(t){ t[prop]=!t[prop]; save(); render(); } }
function mvTask(gid,i,dir){ const g=findGoal(gid); if(!g) return; const a=g.tasks; const j=i+dir; if(j<0||j>=a.length) return; [a[i],a[j]]=[a[j],a[i]]; save(); render(); }
function addStep(gid,tid){ const t=findTask(gid,tid); const inp=document.getElementById("ns-"+tid); const v=inp.value.trim(); if(!t||!v) return; t.steps=t.steps||[]; t.steps.push({id:uid(), title:v, done:false}); save(); render(); }
function delStep(gid,tid,sid){ const t=findTask(gid,tid); if(t){ t.steps=t.steps.filter(s=>s.id!==sid); save(); render(); } }
function setST(gid,tid,sid,v){ const t=findTask(gid,tid); const s=t&&t.steps.find(s=>s.id===sid); if(s){ s.title=v.trim(); save(); } }
function tgStep(gid,tid,sid){ const t=findTask(gid,tid); const s=t&&t.steps.find(s=>s.id===sid); if(s){ s.done=!s.done; save(); render(); } }

// ─── الصور ───
function imgsHtml(g,t){
  const arr = t ? (t.imgs = t.imgs||[]) : (g.imgs = g.imgs||[]);
  const tid = t ? t.id : "";
  return '<div class="thumbs">'+
    arr.map((im,i)=>'<img class="thumb" src="'+im+'" onclick="imgView={gid:\''+g.id+'\',tid:\''+tid+'\',idx:'+i+'};render()">').join("")+
    '<button class="thumb" onclick="pickImg(\''+g.id+'\',\''+tid+'\')">＋</button></div>';
}
function pickImg(gid,tid){ imgTarget={gid,tid}; document.getElementById("imgIn").click(); }
function compressImg(file){ return new Promise(res=>{
  const img = new Image();
  img.onload = ()=>{ const mx=800; let w=img.width, h=img.height; const s=Math.min(1, mx/Math.max(w,h)); w=Math.round(w*s); h=Math.round(h*s);
    const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
    res(c.toDataURL("image/jpeg",0.7)); };
  img.src = URL.createObjectURL(file);
}); }
document.getElementById("imgIn").addEventListener("change", async e=>{
  const f = e.target.files[0]; e.target.value="";
  if(!f || !imgTarget) return;
  const data = await compressImg(f);
  const holder = imgTarget.tid ? findTask(imgTarget.gid, imgTarget.tid) : findGoal(imgTarget.gid);
  if(!holder) return;
  holder.imgs = holder.imgs||[];
  holder.imgs.push(data);
  if(!save()) holder.imgs.pop();
  render();
});
function imgHolder(){ return imgView.tid ? findTask(imgView.gid, imgView.tid) : findGoal(imgView.gid); }
function delImg(){ const h=imgHolder(); if(h){ h.imgs.splice(imgView.idx,1); save(); } imgView=null; render(); }
function viewerHtml(){
  const h = imgHolder(); if(!h || !h.imgs[imgView.idx]){ imgView=null; return ""; }
  return '<div class="overlay" onclick="imgView=null;render()"><div class="card" onclick="event.stopPropagation()" style="padding:8px">'+
    '<img src="'+h.imgs[imgView.idx]+'" style="width:100%;border-radius:8px;display:block">'+
    '<div class="flexrow"><button class="btn-sm" style="color:var(--red)" onclick="delImg()">حذف الصورة</button>'+
    '<button class="btn-sm" onclick="imgView=null;render()">إغلاق</button></div></div></div>';
}
// ─── الخريطة الذهنية ───
function vMap(){

    const [gid, tid] = mapDetail.split("|");

      const steps = t? (t.steps||[]) : [];
      detail = '<div class="overlay" onclick="mapDetail=null;render()"><div class="card" onclick="event.stopPropagation()">'+

        (!t? '<div class="muted">عدد المهام: '+(g.tasks||[]).filter(x=>!x.hidden).length+'</div>' : "")+
        (t? '<div class="muted">الخطوات: '+steps.filter(s=>s.done).length+' منجزة من '+steps.length+'</div>' : "")+
        (t && steps.length? '<div style="margin-top:8px">'+steps.map(s=>'<div class="step'+(s.done?" done":"")+'"><span>'+(s.done?"✓":"○")+'</span><span class="ttl">'+esc(s.title)+'</span></div>').join("")+'</div>' : "")+
        '<button class="btn" style="margin:14px 0 0" onclick="mapDetail=null;render()">إغلاق</button>'+

    }
  }
  return '<div class="yearnav">'+

    '<div class="mm-root">أهداف العام '+goalsYear+'</div>'+
    (arr.length? '<div class="mm-branch">'+arr.map(g=>{
      const tasks = (g.tasks||[]).filter(t=>!t.hidden && (t.title||"").trim());
      return '<div class="mm-wrap"><div class="mm-goal" onclick="mapDetail=\''+g.id+'\';render()">'+(g.done?'✓ ':'')+esc(g.title)+'</div>'+
        (tasks.length? '<div class="mm-tasks">'+tasks.map(t=>'<div class="mm-task" onclick="mapDetail=\''+g.id+'|'+t.id+'\';render()">'+esc(t.title)+'</div>').join("")+'</div>' : "")+
        '</div>';
    }).join("")+'</div>' : '<div class="empty">لا توجد أهداف ظاهرة لهذا العام — أضفها من «الأساسية» أو أظهر المخفي منها.</div>')+
    detail;
}

      (d.note? '<div style="font-size:12px;color:var(--ink2)">'+esc(d.note)+'</div>':'')+

      '<div style="font-weight:700;font-size:16px;font-variant-numeric:tabular-nums">'+fmt(d.amount)+' ر.س</div></div>'+
      '<div class="flexrow">'+
      '<button class="btn-sm" style="background:'+(d.paid?'#fff':'var(--green)')+';color:'+(d.paid?'var(--ink)':'#fff')+';border-color:'+(d.paid?'var(--line)':'var(--green)')+'" onclick="togDebt(\''+d.id+'\')">'+(d.paid?'إعادة كغير مسدد':'تحديد كمسدد')+'</button>'+
      '<button class="btn-sm" style="color:var(--red)" onclick="delDebt(\''+d.id+'\')">🗑 حذف</button>'+

    }).join("") : '<div class="card"><div class="empty">لا توجد ديون مسجلة — عساها دائمًا كذلك.</div></div>')+

function addDebt(){
  const name = document.getElementById("dbName").value.trim();
  const amt = +document.getElementById("dbAmt").value;
  const due = document.getElementById("dbDue").value;
  if(!name || !amt || amt<=0 || !due) return;
  D.debts.unshift({ id:uid(), name, amount:amt, due, note:document.getElementById("dbNote").value.trim(), paid:false });
  save(); render();
}
function togDebt(id){ D.debts = D.debts.map(d=> d.id===id? {...d, paid:!d.paid} : d); save(); render(); }
function delDebt(id){ D.debts = D.debts.filter(d=>d.id!==id); save(); render(); }

// ─── التقارير ───
function vRep(){
  const ck = curKey();
  const months = [];
  for(let i=5;i>=0;i--){
    const d = new Date(NOW.getFullYear(), NOW.getMonth()-i, 1);
    const key = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    let inc=0, exp=0;
    D.tx.forEach(t=>{ if((t.date||"").startsWith(key)){ t.type==="in"?inc+=+t.amount:exp+=+t.amount; }});
    months.push({label:MONTHS[d.getMonth()], inc, exp});
  }
  const max = Math.max(1, ...months.flatMap(m=>[m.inc,m.exp]));
  const brk = (type)=>{ const m={}; D.tx.forEach(t=>{ if(t.type===type && (t.date||"").startsWith(ck)) m[t.cat]=(m[t.cat]||0)+ +t.amount; }); return Object.entries(m).sort((a,b)=>b[1]-a[1]); };
  const incB = brk("in"), expB = brk("out");
  const bars = (arr, color) => { const mx=Math.max(1,...arr.map(([,v])=>v)); return arr.map(([cat,val])=>
    '<div style="margin-bottom:10px"><div class="brk-row"><span>'+esc(cat)+'</span><span style="font-weight:700;font-variant-numeric:tabular-nums">'+fmt(val)+' ر.س</span></div>'+
    '<div class="bar-wrap"><div class="bar" style="width:'+((val/mx)*100)+'%;background:'+color+'"></div></div></div>').join(""); };
  const mn = MONTHS[NOW.getMonth()];
  return '<button class="btn" onclick="exportCSV()">⬇ تصدير التقرير إلى Excel</button>'+
  '<div class="card"><div class="sec-title">الدخل والمصروف — آخر ٦ أشهر</div><div class="chart">'+
    months.map(m=>'<div class="col"><div class="bars">'+
      '<div class="b" style="height:'+((m.inc/max)*100)+'%;min-height:'+(m.inc?3:0)+'px;background:var(--green)"></div>'+
      '<div class="b" style="height:'+((m.exp/max)*100)+'%;min-height:'+(m.exp?3:0)+'px;background:var(--red)"></div>'+
      '</div><div class="m">'+m.label+'</div></div>').join("")+
    '</div><div class="legend"><span><span class="sw" style="background:var(--green)"></span>دخل</span><span><span class="sw" style="background:var(--red)"></span>مصروف</span></div></div>'+
    '<div class="card"><div class="sec-title">دخل '+mn+' حسب المصدر</div>'+(incB.length? bars(incB,"var(--green)") : '<div class="muted">لا يوجد دخل مسجل هذا الشهر.</div>')+'</div>'+
    '<div class="card"><div class="sec-title">مصاريف '+mn+' حسب الفئة</div>'+(expB.length? bars(expB,"var(--brass)") : '<div class="muted">لا توجد مصاريف هذا الشهر.</div>')+'</div>';
}

applyRecur();
function csvCell(v){ v=String(v??""); return '"'+v.replace(/"/g,'""')+'"'; }
function exportCSV(){
  const rows = [];
  const push = arr => rows.push(arr.map(csvCell).join(","));
  push(["التقرير المالي — نظام الإدارة الشخصي"]); push(["تاريخ التصدير", today()]); push([]);
  push(["الحركات المالية"]);
  push(["التاريخ","النوع","الفئة","المبلغ (ر.س)","ملاحظة"]);
  [...D.tx].sort((a,b)=>a.date.localeCompare(b.date)).forEach(t=> push([t.date, t.type==="in"?"دخل":"مصروف", t.cat, t.amount, t.note||""]));
  push([]);
  push(["ملخص آخر 6 أشهر"]); push(["الشهر","الدخل","المصروف","الصافي"]);
  for(let i=5;i>=0;i--){
    const d = new Date(NOW.getFullYear(), NOW.getMonth()-i, 1);
    const key = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    let inc=0, exp=0;
    D.tx.forEach(t=>{ if((t.date||"").startsWith(key)){ t.type==="in"?inc+=+t.amount:exp+=+t.amount; }});
    push([MONTHS[d.getMonth()]+" "+d.getFullYear(), inc, exp, inc-exp]);
  }
  push([]);
  const ck = curKey();
  const brk = (type)=>{ const m={}; D.tx.forEach(t=>{ if(t.type===type && (t.date||"").startsWith(ck)) m[t.cat]=(m[t.cat]||0)+ +t.amount; }); return Object.entries(m).sort((a,b)=>b[1]-a[1]); };
  push(["دخل الشهر الحالي حسب المصدر"]); push(["الفئة","المبلغ"]);
  brk("in").forEach(([c,v])=>push([c,v])); push([]);
  push(["مصاريف الشهر الحالي حسب الفئة"]); push(["الفئة","المبلغ"]);
  brk("out").forEach(([c,v])=>push([c,v])); push([]);
  if(D.commit.length){ push(["الالتزامات في التقويم"]); push(["التاريخ","النوع","الوصف","المبلغ"]);
    [...D.commit].sort((a,b)=>a.date.localeCompare(b.date)).forEach(c=>push([c.date, c.type==="in"?"دخل متوقع":"مصروف متوقع", c.title, c.amount])); }
  const blob = new Blob(["\uFEFF"+rows.join("\r\n")], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "التقرير-المالي-"+today()+".csv";
  document.body.appendChild(a); a.click(); a.remove();
  toast("تم تنزيل التقرير — يفتح مباشرة في Excel");
}
render();
checkReminders();
if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(()=>{}); }
